<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoChart - 안과 음성 자동 차팅</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-card-hover: #1e2740;
    --border: #2a3650;
    --text-primary: #e8ecf4;
    --text-secondary: #8896b0;
    --text-muted: #5a6a85;
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.25);
    --accent-soft: #1e3a5f;
    --red: #ef4444;
    --red-glow: rgba(239, 68, 68, 0.3);
    --green: #22c55e;
    --green-glow: rgba(34, 197, 94, 0.2);
    --amber: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-secondary);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 16px var(--accent-glow);
  }

  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .settings-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .settings-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
  }

  /* ── Main Layout ── */
  .main {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .card-title .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green-glow); }
  .card-title .dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red-glow); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .card-body { padding: 20px; }

  /* ── Record Button ── */
  .record-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 32px 20px;
  }

  .record-btn {
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 3px solid var(--border);
    background: var(--bg-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
    position: relative;
  }

  .record-btn:hover {
    border-color: var(--accent);
    box-shadow: 0 0 24px var(--accent-glow);
  }

  .record-btn.recording {
    border-color: var(--red);
    box-shadow: 0 0 32px var(--red-glow);
    animation: pulse-border 1.5s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 24px var(--red-glow); }
    50% { box-shadow: 0 0 48px var(--red-glow); }
  }

  .record-btn .mic-icon {
    width: 28px; height: 28px;
    fill: var(--text-secondary);
    transition: fill 0.3s;
  }

  .record-btn.recording .mic-icon { fill: var(--red); }

  .record-btn .stop-icon {
    width: 24px; height: 24px;
    background: var(--red);
    border-radius: 4px;
    display: none;
  }
  .record-btn.recording .mic-icon { display: none; }
  .record-btn.recording .stop-icon { display: block; }

  .record-status {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    min-height: 20px;
  }

  .record-status.recording { color: var(--red); font-weight: 500; }

  /* ── VU Meter ── */
  .vu-meter {
    width: 100%;
    max-width: 300px;
    height: 4px;
    background: var(--bg-primary);
    border-radius: 2px;
    overflow: hidden;
  }

  .vu-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
    border-radius: 2px;
    transition: width 0.05s;
  }

  /* ── Timer ── */
  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 2px;
  }
  .timer.active { color: var(--red); }

  /* ── Output Area ── */
  .output-area {
    min-height: 120px;
    font-family: 'JetBrains Mono', 'Noto Sans KR', monospace;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-primary);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output-area.placeholder {
    color: var(--text-muted);
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
  }

  /* ── Action Buttons ── */
  .actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: var(--accent);
  }

  .action-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .action-btn.primary:hover {
    background: #2563eb;
  }

  .action-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ── Processing Indicator ── */
  .processing {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--accent-soft);
    border-radius: 8px;
    font-size: 13px;
    color: var(--accent);
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--accent);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Settings Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px;
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-group textarea {
    min-height: 200px;
    resize: vertical;
    line-height: 1.6;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  /* ── Status Bar ── */
  .status-bar {
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .status-dot.connected { background: var(--green); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 20px;
    background: var(--bg-card);
    border: 1px solid var(--green);
    border-radius: 8px;
    font-size: 13px;
    color: var(--green);
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header { padding: 16px; }
    .main { padding: 16px; }
    .modal { width: calc(100% - 32px); margin: 16px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">🏥</div>
    <div>
      <div class="title">AutoChart</div>
      <div class="subtitle">안과 음성 자동 차팅</div>
    </div>
  </div>
  <button class="settings-btn" onclick="openSettings()">⚙ 설정</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Recording Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span class="dot" id="recDot"></span>
        <span id="recLabel">음성 녹음</span>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="record-section">
      <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
        <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <div class="stop-icon"></div>
      </button>
      <div class="vu-meter"><div class="vu-bar" id="vuBar"></div></div>
      <div class="record-status" id="recStatus">버튼을 눌러 녹음을 시작하세요</div>
    </div>
  </div>

  <!-- Transcription Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span class="dot" id="sttDot"></span>
        음성 인식 결과
      </div>
    </div>
    <div class="card-body">
      <div class="output-area placeholder" id="transcription">
        녹음 후 음성 인식 결과가 여기에 표시됩니다
      </div>
    </div>
  </div>

  <!-- Chart Card -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">
        <span class="dot" id="chartDot"></span>
        정리된 차트
      </div>
      <div class="actions">
        <button class="action-btn" id="copyBtn" onclick="copyChart()" disabled>
          📋 클립보드 복사
        </button>
        <button class="action-btn primary" id="sendBtn" onclick="sendToLocal()" disabled>
          ▶ MD soft 전송
        </button>
      </div>
    </div>
    <div class="card-body">
      <div class="output-area placeholder" id="chartOutput">
        AI가 정리한 차트가 여기에 표시됩니다
      </div>
    </div>
    <div class="status-bar">
      <span class="status-dot" id="bridgeDot"></span>
      <span id="bridgeStatus">로컬 브릿지 연결 대기</span>
    </div>
  </div>

</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙ 설정</h2>
    <div class="form-group">
      <label>OpenAI API Key (Whisper)</label>
      <input type="password" id="openaiKey" placeholder="sk-..." />
    </div>
    <div class="form-group">
      <label>Anthropic API Key (Claude)</label>
      <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
    </div>
    <div class="form-group">
      <label>차팅 시스템 프롬프트</label>
      <textarea id="systemPrompt"></textarea>
    </div>
    <div class="modal-actions">
      <button class="action-btn" onclick="closeSettings()">취소</button>
      <button class="action-btn primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let audioContext = null;
let analyser = null;
let animFrameId = null;
let timerInterval = null;
let recordingStartTime = 0;
let lastChart = "";

const LOCAL_BRIDGE_URL = "http://localhost:5678";
const DEFAULT_SYSTEM_PROMPT = `당신은 안과 전문의의 음성을 전자차트(EMR) 형식으로 정리하는 의료 AI 어시스턴트입니다.

## 규칙
1. 의사의 구어체 음성을 아래 SOAP 형식의 정형화된 차트 기록으로 변환합니다.
2. 의학 약어를 적절히 사용합니다 (예: VA, IOP, SLE, fundus 등).
3. 불필요한 말(음, 어, 그러니까 등)은 제거합니다.
4. 숫자와 단위는 정확하게 기록합니다.
5. 언급되지 않은 항목은 포함하지 않습니다.
6. 한국어와 영어 의학용어를 적절히 혼용합니다.

## 출력 형식

[C/C] (Chief Complaint / 주소)
- 주요 증상 및 내원 사유

[Hx] (History / 병력)
- 현병력, 과거력, 관련 병력

[Ex] (Examination / 검사소견)
- VA: (시력)
- IOP: (안압)
- SLE: (세극등 검사)
- Fundus: (안저검사)
- 기타 검사 소견

[A/P] (Assessment & Plan / 진단 및 계획)
- Dx: 진단명
- Plan: 치료 계획, 처방, 추적 관찰 일정

## 중요
- 의사가 언급한 내용만 기록합니다.
- 추측이나 추가 정보를 넣지 않습니다.
- 간결하고 명확하게 작성합니다.`;

// ═══════════════════════════════════════════════════════════
//  Settings (localStorage)
// ═══════════════════════════════════════════════════════════
function loadSettings() {
  return {
    openaiKey: localStorage.getItem("ac_openai_key") || "",
    anthropicKey: localStorage.getItem("ac_anthropic_key") || "",
    systemPrompt: localStorage.getItem("ac_system_prompt") || DEFAULT_SYSTEM_PROMPT,
  };
}

function openSettings() {
  const s = loadSettings();
  document.getElementById("openaiKey").value = s.openaiKey;
  document.getElementById("anthropicKey").value = s.anthropicKey;
  document.getElementById("systemPrompt").value = s.systemPrompt;
  document.getElementById("settingsModal").classList.add("show");
}

function closeSettings() {
  document.getElementById("settingsModal").classList.remove("show");
}

function saveSettings() {
  localStorage.setItem("ac_openai_key", document.getElementById("openaiKey").value.trim());
  localStorage.setItem("ac_anthropic_key", document.getElementById("anthropicKey").value.trim());
  localStorage.setItem("ac_system_prompt", document.getElementById("systemPrompt").value.trim());
  closeSettings();
  showToast("설정이 저장되었습니다");
}

// ═══════════════════════════════════════════════════════════
//  Recording
// ═══════════════════════════════════════════════════════════
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  const settings = loadSettings();
  if (!settings.openaiKey) {
    showToast("⚠️ 설정에서 OpenAI API Key를 입력하세요");
    openSettings();
    return;
  }
  if (!settings.anthropicKey) {
    showToast("⚠️ 설정에서 Anthropic API Key를 입력하세요");
    openSettings();
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    
    // MediaRecorder
    mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm;codecs=opus" });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      processAudio();
    };

    mediaRecorder.start(250);

    // Audio Analyser for VU meter
    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);
    updateVU();

    // UI
    isRecording = true;
    recordingStartTime = Date.now();
    updateTimer();
    timerInterval = setInterval(updateTimer, 100);

    document.getElementById("recordBtn").classList.add("recording");
    document.getElementById("recDot").classList.add("recording");
    document.getElementById("recLabel").textContent = "녹음 중...";
    document.getElementById("recStatus").textContent = "녹음 중... 버튼을 눌러 중지";
    document.getElementById("recStatus").classList.add("recording");

  } catch (err) {
    showToast("⚠️ 마이크 접근 권한이 필요합니다");
    console.error(err);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
  isRecording = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrameId);

  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }

  document.getElementById("recordBtn").classList.remove("recording");
  document.getElementById("recDot").classList.remove("recording");
  document.getElementById("recLabel").textContent = "음성 녹음";
  document.getElementById("recStatus").textContent = "처리 중...";
  document.getElementById("recStatus").classList.remove("recording");
  document.getElementById("vuBar").style.width = "0%";
}

function updateTimer() {
  const elapsed = Date.now() - recordingStartTime;
  const sec = Math.floor(elapsed / 1000);
  const min = Math.floor(sec / 60);
  const s = sec % 60;
  const timerEl = document.getElementById("timer");
  timerEl.textContent = `${String(min).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  timerEl.classList.toggle("active", isRecording);
}

function updateVU() {
  if (!analyser || !isRecording) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b) => a+b, 0) / data.length;
  const pct = Math.min(100, (avg / 128) * 100);
  document.getElementById("vuBar").style.width = pct + "%";
  animFrameId = requestAnimationFrame(updateVU);
}

// ═══════════════════════════════════════════════════════════
//  Audio Processing Pipeline
// ═══════════════════════════════════════════════════════════
async function processAudio() {
  const settings = loadSettings();
  const blob = new Blob(audioChunks, { type: "audio/webm" });

  // Check audio size
  if (blob.size < 1000) {
    document.getElementById("recStatus").textContent = "녹음이 너무 짧습니다. 다시 시도하세요.";
    return;
  }

  try {
    // ── Step 1: Whisper STT ──
    setStepActive("stt");
    document.getElementById("transcription").textContent = "";
    document.getElementById("transcription").classList.remove("placeholder");
    showProcessing("transcription", "음성 인식 중 (Whisper API)...");

    const formData = new FormData();
    formData.append("file", blob, "recording.webm");
    formData.append("model", "whisper-1");
    formData.append("language", "ko");

    const sttRes = await fetch("https://api.openai.com/v1/audio/transcriptions", {
      method: "POST",
      headers: { "Authorization": `Bearer ${settings.openaiKey}` },
      body: formData,
    });

    if (!sttRes.ok) {
      const err = await sttRes.json().catch(() => ({}));
      throw new Error(`Whisper API 오류: ${err.error?.message || sttRes.status}`);
    }

    const sttData = await sttRes.json();
    const transcription = sttData.text;

    if (!transcription || !transcription.trim()) {
      document.getElementById("transcription").textContent = "음성이 인식되지 않았습니다. 더 크게 말해보세요.";
      document.getElementById("recStatus").textContent = "다시 녹음해주세요";
      setStepDone("stt", false);
      return;
    }

    document.getElementById("transcription").textContent = transcription;
    setStepDone("stt", true);

    // ── Step 2: Claude Charting ──
    setStepActive("chart");
    document.getElementById("chartOutput").textContent = "";
    document.getElementById("chartOutput").classList.remove("placeholder");
    showProcessing("chartOutput", "차트 정리 중 (Claude API)...");

    const claudeRes = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": settings.anthropicKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2048,
        system: settings.systemPrompt || DEFAULT_SYSTEM_PROMPT,
        messages: [{
          role: "user",
          content: `다음은 안과 진료 중 의사의 음성 녹음을 텍스트로 변환한 내용입니다.\n이를 전자차트 형식으로 정리해주세요.\n\n---\n${transcription}\n---`
        }]
      }),
    });

    if (!claudeRes.ok) {
      const err = await claudeRes.json().catch(() => ({}));
      throw new Error(`Claude API 오류: ${err.error?.message || claudeRes.status}`);
    }

    const claudeData = await claudeRes.json();
    lastChart = claudeData.content[0].text;

    document.getElementById("chartOutput").textContent = lastChart;
    setStepDone("chart", true);

    // Enable buttons
    document.getElementById("copyBtn").disabled = false;
    document.getElementById("sendBtn").disabled = false;

    document.getElementById("recStatus").textContent = "완료! 클립보드 복사 또는 MD soft 전송하세요";
    showToast("차트 정리 완료!");

  } catch (err) {
    console.error(err);
    document.getElementById("recStatus").textContent = "오류 발생: " + err.message;
    showToast("⚠️ " + err.message);
  }
}

// ═══════════════════════════════════════════════════════════
//  Step Indicators
// ═══════════════════════════════════════════════════════════
function setStepActive(step) {
  const dotId = step === "stt" ? "sttDot" : "chartDot";
  document.getElementById(dotId).className = "dot recording";
}

function setStepDone(step, success) {
  const dotId = step === "stt" ? "sttDot" : "chartDot";
  document.getElementById(dotId).className = success ? "dot active" : "dot";
}

function showProcessing(containerId, message) {
  const el = document.getElementById(containerId);
  el.innerHTML = `<div class="processing"><div class="spinner"></div>${message}</div>`;
}

// ═══════════════════════════════════════════════════════════
//  Actions
// ═══════════════════════════════════════════════════════════
async function copyChart() {
  if (!lastChart) return;
  try {
    await navigator.clipboard.writeText(lastChart);
    showToast("클립보드에 복사되었습니다!");
  } catch {
    // Fallback
    const ta = document.createElement("textarea");
    ta.value = lastChart;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("클립보드에 복사되었습니다!");
  }
}

async function sendToLocal() {
  if (!lastChart) return;
  try {
    const res = await fetch(LOCAL_BRIDGE_URL + "/paste", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chart: lastChart }),
    });
    if (res.ok) {
      showToast("MD soft에 전송 완료!");
    } else {
      throw new Error("전송 실패");
    }
  } catch {
    showToast("⚠️ 로컬 브릿지가 실행 중이 아닙니다. 클립보드에 복사합니다.");
    copyChart();
  }
}

// ═══════════════════════════════════════════════════════════
//  Local Bridge Health Check
// ═══════════════════════════════════════════════════════════
async function checkBridge() {
  try {
    const res = await fetch(LOCAL_BRIDGE_URL + "/health", { signal: AbortSignal.timeout(2000) });
    if (res.ok) {
      document.getElementById("bridgeDot").classList.add("connected");
      document.getElementById("bridgeStatus").textContent = "로컬 브릿지 연결됨 (MD soft 자동 붙여넣기 가능)";
      return;
    }
  } catch {}
  document.getElementById("bridgeDot").classList.remove("connected");
  document.getElementById("bridgeStatus").textContent = "로컬 브릿지 미연결 (클립보드 복사만 가능)";
}

setInterval(checkBridge, 5000);
checkBridge();

// ═══════════════════════════════════════════════════════════
//  Toast
// ═══════════════════════════════════════════════════════════
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

// ═══════════════════════════════════════════════════════════
//  Keyboard Shortcut
// ═══════════════════════════════════════════════════════════
document.addEventListener("keydown", (e) => {
  // Ctrl+Shift+R: Toggle recording (prevent in input fields)
  if (e.ctrlKey && e.shiftKey && e.code === "KeyR" && e.target.tagName !== "INPUT" && e.target.tagName !== "TEXTAREA") {
    e.preventDefault();
    toggleRecording();
  }
  // Escape: Close modal
  if (e.key === "Escape") closeSettings();
});
</script>
